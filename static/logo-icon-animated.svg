<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- White background with orange border -->
  <rect x="0" y="0" width="100" height="100" rx="16" fill="#ffffff"/>
  <rect x="0" y="0" width="100" height="100" rx="16" fill="none" stroke="#f97316" stroke-width="3"/>

  <!-- Radar rings above volcano peak — pulse outward -->
  <circle cx="50" cy="32" r="22" fill="none" stroke="#f97316" stroke-width="1.2" opacity="0.25">
    <animate attributeName="r" values="7;22" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="32" r="14" fill="none" stroke="#f97316" stroke-width="1.4" opacity="0.45">
    <animate attributeName="r" values="7;22" dur="3s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0" dur="3s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="32" r="7" fill="none" stroke="#f97316" stroke-width="1.6" opacity="0.7">
    <animate attributeName="r" values="7;22" dur="3s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0" dur="3s" begin="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Rotating radar sweep -->
  <g>
    <line x1="50" y1="32" x2="50" y2="12" stroke="#f97316" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <animateTransform attributeName="transform" type="rotate" from="0 50 32" to="360 50 32" dur="4s" repeatCount="indefinite"/>
  </g>

  <!-- Crosshair lines -->
  <line x1="50" y1="5"  x2="50" y2="22" stroke="#f97316" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="42" x2="50" y2="55" stroke="#f97316" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="6"  y1="32" x2="21" y2="32" stroke="#f97316" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="79" y1="32" x2="94" y2="32" stroke="#f97316" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Target/eruption dot — blink -->
  <circle cx="50" cy="32" r="4" fill="#f97316">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="32" r="1.8" fill="#ffffff"/>

  <!-- Volcano body — dark, large, clear -->
  <polygon points="50,40 12,88 88,88" fill="#1e293b"/>
  <!-- Inner shadow/ridge -->
  <polygon points="50,40 36,74 64,74" fill="#334155"/>

  <!-- Lava flows — animated draw -->
  <path d="M46,50 Q36,65 28,85" stroke="#f97316" stroke-width="3.5" fill="none" stroke-linecap="round"
        stroke-dasharray="42" stroke-dashoffset="0">
    <animate attributeName="stroke-dashoffset" values="42;0" dur="2.5s" repeatCount="indefinite"/>
  </path>
  <path d="M54,52 Q62,67 70,84" stroke="#ea580c" stroke-width="3" fill="none" stroke-linecap="round"
        stroke-dasharray="40" stroke-dashoffset="0">
    <animate attributeName="stroke-dashoffset" values="40;0" dur="2.8s" begin="0.4s" repeatCount="indefinite"/>
  </path>
  <path d="M50,43 Q47,58 45,74" stroke="#fb923c" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8"
        stroke-dasharray="32" stroke-dashoffset="0">
    <animate attributeName="stroke-dashoffset" values="32;0" dur="2.2s" begin="0.8s" repeatCount="indefinite"/>
  </path>

  <!-- Eruption glow at peak — pulse -->
  <circle cx="50" cy="40" r="6" fill="#fed7aa" opacity="0.6">
    <animate attributeName="r" values="5;8;5" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Circuit board strip at base -->
  <rect x="12" y="88" width="76" height="5" rx="2" fill="#1e293b"/>
  <!-- Circuit dots — blink staggered -->
  <circle cx="22" cy="90.5" r="2" fill="#f97316">
    <animate attributeName="opacity" values="1;0.2;1" dur="2s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <circle cx="36" cy="90.5" r="1.5" fill="#06b6d4">
    <animate attributeName="opacity" values="1;0.2;1" dur="2s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="90.5" r="2" fill="#f97316">
    <animate attributeName="opacity" values="1;0.2;1" dur="2s" begin="0.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="64" cy="90.5" r="1.5" fill="#06b6d4">
    <animate attributeName="opacity" values="1;0.2;1" dur="2s" begin="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="78" cy="90.5" r="2" fill="#f97316">
    <animate attributeName="opacity" values="1;0.2;1" dur="2s" begin="1.6s" repeatCount="indefinite"/>
  </circle>

  <!-- Small circuit lines on strip -->
  <line x1="22" y1="88" x2="22" y2="93" stroke="#f97316" stroke-width="1.2"/>
  <line x1="50" y1="88" x2="50" y2="93" stroke="#f97316" stroke-width="1.2"/>
  <line x1="78" y1="88" x2="78" y2="93" stroke="#f97316" stroke-width="1.2"/>
</svg>
