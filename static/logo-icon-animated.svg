<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Caldera — animated: crater rim sweeps like a radar, magma core pulses -->
  <style>
    .rim {
      transform-origin: 50px 50px;
      animation: sweep 8s linear infinite;
    }
    .core {
      transform-origin: 50px 50px;
      animation: pulse 2.6s ease-in-out infinite;
    }
    @keyframes sweep {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1);    opacity: 1; }
      50%      { transform: scale(1.25); opacity: 0.75; }
    }
    @media (prefers-reduced-motion: reduce) {
      .rim, .core { animation: none; }
    }
  </style>

  <!-- White background with orange border -->
  <rect x="0" y="0" width="100" height="100" rx="16" fill="#ffffff"/>
  <rect x="0" y="0" width="100" height="100" rx="16" fill="none" stroke="#f97316" stroke-width="3"/>

  <!-- Outer ring: the volcano's flank -->
  <circle cx="50" cy="50" r="34" fill="none" stroke="#1e293b" stroke-width="8"/>

  <!-- Broken crater rim: rotates slowly, like a scan in progress -->
  <g class="rim" fill="none" stroke="#1e293b" stroke-width="6" stroke-linecap="round" opacity="0.5">
    <path d="M50 30 A20 20 0 0 1 67.3 40"/>
    <path d="M67.3 60 A20 20 0 0 1 32.7 60"/>
    <path d="M32.7 40 A20 20 0 0 1 43.2 31.2"/>
  </g>

  <!-- Magma core: pulses like a live indicator -->
  <circle class="core" cx="50" cy="50" r="9.5" fill="#f97316"/>
</svg>
