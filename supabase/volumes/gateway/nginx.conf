# Gateway minimale: espone l'API in stile Supabase (/rest/v1/*) verso PostgREST.
# Serve a far funzionare il client ufficiale supabase-py, che chiama {url}/rest/v1.
events {}

http {
  server {
    listen 8000;

    # /rest/v1/<tabella> -> PostgREST (lo slash finale rimuove il prefisso).
    location /rest/v1/ {
      proxy_pass http://rest:3000/;
      proxy_set_header Host $host;
      proxy_set_header Authorization $http_authorization;
      proxy_set_header apikey $http_apikey;
      proxy_set_header Accept-Profile $http_accept_profile;
      proxy_set_header Content-Profile $http_content_profile;
      proxy_set_header Prefer $http_prefer;
    }

    location = / {
      default_type text/plain;
      return 200 "vfa supabase local gateway\n";
    }
  }
}
